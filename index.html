<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel NX - LYNX RAZE v4.9.0</title>
    <style>
        /* ESTILOS COMPLETOS */
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 15px; border-top: 4px solid #ff4b2b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { text-align: center; color: #ff4b2b; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        .tabla-miembros { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .tabla-miembros th { color: #ff4b2b; text-align: left; padding: 10px 5px; font-size: 0.9em; border-bottom: 1px solid #333; }
        .tabla-miembros td { padding: 12px 5px; border-bottom: 1px solid #222; vertical-align: middle; }
        .nombre-id { cursor: pointer; }
        .nombre-id b { display: block; font-size: 1em; color: white; }
        .nombre-id span { font-size: 0.75em; color: #888; }
        .btn-mas-uno { background: #2ecc71; padding: 8px 20px; border-radius: 8px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; border: 2px solid #ff4b2b; text-align: center; }
        .logo-login { width: 120px; margin-bottom: 15px; border-radius: 10px; }
        .checkbox-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; font-size: 0.9em; color: #ccc; }
        .checkbox-container input { width: auto; margin: 0; transform: scale(1.2); }

        .info-perfil { text-align: left; background: #222; padding: 15px; border-radius: 10px; margin: 15px 0; }
        .info-perfil p { margin: 5px 0; font-size: 0.9em; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .asistencia-tag { background: #333; padding: 4px 8px; border-radius: 5px; margin: 3px; display: inline-block; border: 1px solid #ff4b2b; font-size: 0.8em; }

        .contador-badge { display: inline-block; background: #333; padding: 3px 8px; border-radius: 10px; font-size: 0.5em; vertical-align: middle; margin-left: 10px; color: #aaa; border: 1px solid #444; }
        .insignia { font-size: 0.65em; padding: 2px 5px; border-radius: 4px; margin-left: 6px; vertical-align: middle; font-weight: bold; display: inline-block; }
        .insignia-1m { background: #cd7f32; color: white; } 
        .insignia-1a { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; } 
    </style>
</head>
<body>

<div id="login-screen" class="modal" style="display: flex;">
    <div class="modal-content">
        <img src="https://www.dropbox.com/scl/fi/81xsxq6xekxu8ltaiup97/NX-RAZE.png?rlkey=7vzyi0bx6viww237skgvq0nxt&raw=1" alt="Logo" class="logo-login">
        <h2 style="border:none; font-size: 1.2em;">Líderes LYNX RAZE</h2>
        <input type="text" id="login-nombre" placeholder="Nombre de Líder">
        <input type="password" id="login-pin" inputmode="numeric" placeholder="PIN de 4 dígitos">
        <label class="checkbox-container"><input type="checkbox" id="login-recordar"> Recordarme (1 semana)</label>
        <div id="login-error" style="color: #e74c3c; font-size: 0.85em; margin-bottom: 10px; display: none;">❌ Datos incorrectos</div>
        <button onclick="validarIngreso()">ENTRAR AL PANEL</button>
    </div>
</div>

<div class="container">
    <h2 id="form-title">➕ Registrar Jugador</h2>
    <input type="hidden" id="edit-id">
    <input type="text" id="idJugador" placeholder="ID del Jugador">
    <input type="text" id="nombreJuego" placeholder="Nombre en Juego (Nick)">
    <input type="text" id="nombreDC" placeholder="Usuario Discord">
    <input type="tel" id="telefono" placeholder="Número de Teléfono">
    <small style="color: #888; display: block; margin-top: 10px;">Fecha de ingreso:</small>
    <input type="date" id="fechaIngreso">
    <button id="btn-save" onclick="registrarJugador()">GUARDAR JUGADOR</button>
    <button id="btn-cancel-edit" onclick="resetForm()" style="display:none; background:#555;">CANCELAR EDICIÓN</button>
</div>

<div class="container">
    <h2>🔍 Buscador</h2>
    <button onclick="toggleFilterMode()" id="filter-mode" style="background:#f1c40f; color:black; margin-bottom:10px;">MODO: SEMANA ACTUAL</button>
    <input type="text" id="campoBusqueda" placeholder="Buscar por ID, nombre, tel o Discord..." oninput="buscarJugador()">
    <div id="resultadosBusqueda"></div>
</div>

<div class="container">
    <h2>📋 Lista de Miembros <span id="contador-miembros" class="contador-badge">0</span></h2>
    <button onclick="mostrarListaCompleta()" style="background: #333;">ACTUALIZAR LISTA</button>
    <table class="tabla-miembros">
        <thead>
            <tr>
                <th>Nombre</th>
                <th style="text-align:center">Asist.</th>
                <th style="text-align:right">Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoLista"></tbody>
    </table>
</div>

<div class="container">
    <h2>📂 Historial General</h2>
    <button onclick="verHistorialCompleto()" style="background: #2a2a2a;">CARGAR SEMANAS PASADAS</button>
    <div id="historialContenedor" style="margin-top:15px; font-size: 0.9em;"></div>
</div>

<div class="container" style="border-top-color: #ff0000;">
    <h2>⚙️ Cierre Semanal</h2>
    <button style="background: #ff0000;" onclick="cerrarSemana()">GUARDAR HISTORIAL Y REINICIAR ASISTENCIAS</button>
</div>

<div id="modalHora" class="modal"><div class="modal-content">
    <h3>Hora de Actividad</h3>
    <input type="time" id="horaAsistencia" value="20:00">
    <button onclick="confirmarAsistencia()">CONFIRMAR (+1)</button>
    <button onclick="cerrarModal('modalHora')" style="background:#444;">SALIR</button>
</div></div>

<div id="modalPerfil" class="modal"><div class="modal-content">
    <h2 id="perf-nick" style="margin:0">NICK</h2>
    <span id="perf-id" style="color:#888">ID: 0000</span>
    <div class="info-perfil" id="perf-info"></div>
    <div id="perf-horas" style="margin-bottom:15px"></div>
    <button onclick="ejecutarCargarEdicion()" style="background:#3498db">EDITAR DATOS</button>
    <button onclick="ejecutarEliminar()" style="background:#e74c3c">ELIMINAR DEL CLAN</button>
    <button onclick="cerrarModal('modalPerfil')" style="background:#444;">CERRAR</button>
</div></div>

<script>
    const LIDERES_AUTORIZADOS = ['adryan', 'anahi', 'maxito', 'lupis', 'paco', 'karllus', 'fernando'];
    const PIN_VALIDO = '2306';
    window.sesionNombre = "";

    function validarIngreso() {
        const user = document.getElementById('login-nombre').value.trim().toLowerCase();
        const pin = document.getElementById('login-pin').value.trim();
        if (LIDERES_AUTORIZADOS.includes(user) && pin === PIN_VALIDO) {
            window.sesionNombre = user.toUpperCase();
            if (document.getElementById('login-recordar').checked) {
                localStorage.setItem('lynx_session_v4', JSON.stringify({ user: window.sesionNombre, timestamp: Date.now() }));
            }
            document.getElementById('login-screen').style.display = 'none';
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const guardado = localStorage.getItem('lynx_session_v4');
        if (guardado) {
            const data = JSON.parse(guardado);
            if (Date.now() - data.timestamp < 7 * 24 * 60 * 60 * 1000) {
                window.sesionNombre = data.user;
                document.getElementById('login-screen').style.display = 'none';
            }
        }
    });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, update, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs_OhaoON0akTbIyWpcQSGQTLtxWZqCpI",
    authDomain: "control-de-asistencias-nx.firebaseapp.com",
    databaseURL: "https://control-de-asistencias-nx-default-rtdb.firebaseio.com",
    projectId: "control-de-asistencias-nx",
    storageBucket: "control-de-asistencias-nx.firebasestorage.app",
    appId: "1:877168393884:web:f322dd83065f082cad7759"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let idSeleccionado = null;
  let currentFilter = "semana";

  window.obtenerInsignia = function(fecha) {
      if (!fecha) return "";
      const ingreso = new Date(fecha + "T12:00:00");
      const meses = Math.floor((new Date() - ingreso) / (1000 * 60 * 60 * 24 * 30.44));
      if (meses >= 12) return '<span class="insignia insignia-1a">👑 1A</span>';
      if (meses >= 1) return '<span class="insignia insignia-1m">🥉 1M</span>';
      return "";
  };

  window.mostrarListaCompleta = function() {
      const cuerpo = document.getElementById('cuerpoLista');
      cuerpo.innerHTML = "<tr><td colspan='3' style='text-align:center'>Cargando...</td></tr>";
      get(child(ref(db), 'jugadores')).then((snap) => {
          cuerpo.innerHTML = "";
          const data = snap.val() || {};
          let count = 0;
          for (const id in data) {
              const j = data[id];
              if (!j) continue;
              count++;
              let total = 0;
              if (j.asistencias && typeof j.asistencias === 'object') {
                  Object.values(j.asistencias).forEach(v => total += (Number(v) || 0));
              }
              const insignia = window.obtenerInsignia(j.ingreso);
              cuerpo.innerHTML += `<tr>
                <td class="nombre-id" onclick="window.abrirPerfil('${id}')">
                    <b>${j.nombre || '---'}${insignia}</b>
                    <span>${id}</span>
                </td>
                <td style="text-align:center">${total}</td>
                <td style="text-align:right"><button class="btn-mas-uno" onclick="window.abrirModalAsist('${id}')">+1</button></td>
              </tr>`;
          }
          document.getElementById('contador-miembros').innerText = count + " Miembros";
          if(count === 0) cuerpo.innerHTML = "<tr><td colspan='3' style='text-align:center'>No hay datos</td></tr>";
      });
  };

  window.registrarJugador = function() {
      const id = document.getElementById('idJugador').value.trim();
      const nombre = document.getElementById('nombreJuego').value.trim();
      if(!id || !nombre) return alert("ID y Nombre requeridos");
      
      const datos = { 
          nombre, 
          discord: document.getElementById('nombreDC').value || "", 
          telefono: document.getElementById('telefono').value || "", 
          ingreso: document.getElementById('fechaIngreso').value || new Date().toISOString().split('T')[0] 
      };
      
      update(ref(db, 'jugadores/' + id), datos).then(() => { 
          resetForm(); 
          mostrarListaCompleta(); 
          alert("Guardado exitosamente"); 
      });
  };

  window.abrirPerfil = function(id) {
      idSeleccionado = id;
      get(child(ref(db), 'jugadores/' + id)).then((snap) => {
          const j = snap.val();
          document.getElementById('perf-nick').innerHTML = (j.nombre || '---') + window.obtenerInsignia(j.ingreso);
          document.getElementById('perf-id').innerText = "ID: " + id;
          document.getElementById('perf-info').innerHTML = `<p>📱 Tel: ${j.telefono || '---'}</p><p>💬 Discord: ${j.discord || '---'}</p><p>📅 Ingreso: ${j.ingreso || '---'}</p>`;
          let h = "";
          if(j.asistencias) Object.keys(j.asistencias).forEach(k => h += `<div class="asistencia-tag">${k.replace('_',':')} (+${j.asistencias[k]})</div>`);
          document.getElementById('perf-horas').innerHTML = h || "Sin actividad esta semana";
          document.getElementById('modalPerfil').style.display = "flex";
      });
  };

  window.confirmarAsistencia = function() {
      const hora = document.getElementById('horaAsistencia').value.replace(':', '_');
      runTransaction(ref(db, `jugadores/${idSeleccionado}/asistencias/${hora}`), c => (c || 0) + 1).then(() => { 
          cerrarModal('modalHora'); mostrarListaCompleta(); 
      });
  };

  window.cerrarSemana = function() {
      if(!confirm("¿Cerrar semana?")) return;
      get(child(ref(db), 'jugadores')).then(snap => {
          const p = snap.val(), fecha = new Date().toISOString().split('T')[0], upd = {};
          upd['historial/' + fecha] = p;
          for(let id in p) upd[`jugadores/${id}/asistencias`] = null;
          update(ref(db), upd).then(() => { alert("Semana archivada"); mostrarListaCompleta(); });
      });
  };

  window.buscarJugador = function() {
      const q = document.getElementById('campoBusqueda').value.toLowerCase();
      const res = document.getElementById('resultadosBusqueda');
      res.innerHTML = ""; if(q.length < 1) return;
      const path = currentFilter === "semana" ? 'jugadores' : 'historial';
      get(child(ref(db), path)).then(snap => {
          const data = snap.val() || {};
          for(let id in data) {
              const j = currentFilter === "semana" ? data[id] : Object.values(data[id])[0]; 
              // BÚSQUEDA AMPLIADA: ID, Nombre, Teléfono y Discord
              const searchString = `${id} ${j?.nombre} ${j?.telefono || ""} ${j?.discord || ""}`.toLowerCase();
              if(searchString.includes(q)) {
                  res.innerHTML += `<div class="resultado-card" style="background:#222; padding:10px; margin-top:5px; border-radius:8px;">
                    <b>${j.nombre}</b> (${id}) <button onclick="window.abrirPerfil('${id}')">VER</button></div>`;
              }
          }
      });
  };

  window.toggleFilterMode = () => {
      currentFilter = currentFilter === "semana" ? "total" : "semana";
      document.getElementById('filter-mode').innerText = `MODO: ${currentFilter === "semana" ? "SEMANA ACTUAL" : "HISTORIAL"}`;
  };

  window.ejecutarCargarEdicion = () => {
      const id = idSeleccionado; 
      cerrarModal('modalPerfil');
      get(child(ref(db), 'jugadores/' + id)).then(snap => {
          const j = snap.val();
          document.getElementById('idJugador').value = id;
          document.getElementById('idJugador').disabled = true;
          document.getElementById('nombreJuego').value = j.nombre || "";
          // CORRECCIÓN: Vinculación de campos faltantes
          document.getElementById('nombreDC').value = j.discord || "";
          document.getElementById('telefono').value = j.telefono || "";
          document.getElementById('fechaIngreso').value = j.ingreso || "";
          
          document.getElementById('form-title').innerText = "✏️ Editar Jugador";
          document.getElementById('btn-cancel-edit').style.display = "block";
          window.scrollTo(0,0);
      });
  };

  window.ejecutarEliminar = () => { if(confirm("¿Eliminar?")) remove(ref(db, 'jugadores/' + idSeleccionado)).then(() => { cerrarModal('modalPerfil'); mostrarListaCompleta(); }); };
  window.resetForm = () => { document.querySelectorAll('.container input').forEach(i => i.value = ""); document.getElementById('idJugador').disabled = false; document.getElementById('btn-cancel-edit').style.display = "none"; document.getElementById('form-title').innerText = "➕ Registrar"; };
  window.cerrarModal = (id) => document.getElementById(id).style.display = "none";
  window.abrirModalAsist = (id) => { idSeleccionado = id; document.getElementById('modalHora').style.display = "flex"; };

</script>
</body>
</html>
